name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Setup Node
        uses: actions/setup-node@v6.4.0
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: padre-rico-web/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: padre-rico-web

      - name: Build
        run: npm run build
        working-directory: padre-rico-web

      - name: Configure Pages
        uses: actions/configure-pages@v6.0.0
        with:
          enablement: true

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5.0.0
        with:
          path: padre-rico-web/dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5.0.0
